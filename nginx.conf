# Configuración mínima de nginx para servir la app estática sin que el
# navegador cachee agresivamente los archivos JS/CSS durante el desarrollo
# (evita el clásico "hice un cambio pero no se refleja").
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(js|css)$ {
        add_header Cache-Control "no-store";
    }
}
